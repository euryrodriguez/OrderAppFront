<h2>Listado de Clientes</h2>
<button mat-flat-button routerLink="/customers/create">
    <mat-icon>add</mat-icon> Nuevo Cliente
</button>
<hr>
@if(customers()){
<table mat-table [dataSource]="customers()" class="mat-elevation-z8">
    <!-- The name 'username' must exist in your displayedColumns array -->
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> id </th>
        <!-- "let user" defines the variable for the current row object -->
        <td mat-cell *matCellDef="let customer">
            <!-- Ensure 'user.name' is not undefined or misspelled -->
            {{ customer.id }}
        </td>
    </ng-container>
    <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let customer">
            {{ customer.firstName }}
        </td>
    </ng-container>
    <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef>Apellido</th>
        <td mat-cell *matCellDef="let customer">
            {{ customer.lastName }}
        </td>
    </ng-container>
    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let customer">
            {{ customer.email }}
        </td>
    </ng-container>
    <ng-container matColumnDef="options">
        <th mat-header-cell *matHeaderCellDef>Opciones</th>
        <td mat-cell *matCellDef="let customer">
            <a href="#">Editar</a> &nbsp;
            <button>Eliminar</button>
        </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="dtColumns"></tr>
    <tr mat-row *matRowDef="let row; columns:dtColumns"></tr>
</table>
}
