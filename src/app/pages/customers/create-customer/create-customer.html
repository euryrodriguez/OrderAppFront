<h2>Crear Nuevo Cliente</h2>

<form (submit)="saveCustomer()" [formGroup]="createForm">
    <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input [formControl]="createForm.controls.firstName" matInput>
    </mat-form-field>
    <div>
        <button type="submit" mat-flat-button>Guardar Cambios</button>
        <a mat-stroked-button routerLink="/customers">Cancelar</a>
    </div>
</form>
